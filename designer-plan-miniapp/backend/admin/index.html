<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>原创设计师计划后台跳转</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f4f7ff;
        color: #1f2a44;
      }
      .wrap {
        max-width: 680px;
        margin: 56px auto;
        padding: 24px;
        background: #fff;
        border: 1px solid #dbe3f7;
        border-radius: 14px;
      }
      a {
        color: #0d3aa9;
      }
      .muted {
        color: #66708a;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h2>后台入口已升级</h2>
      <p class="muted">正在跳转到新的模块化后台页面，如果未自动跳转请点击下面链接。</p>
      <p><a id="targetLink" href="/admin/overview">进入后台总览</a></p>
      <p class="muted">新入口：/admin/overview /admin/projects /admin/orders /admin/users /admin/submissions /admin/designers /admin/feedback /admin/logs /admin/settings /admin/part-adapter</p>
    </div>

    <script>
      (function redirectToModulePage() {
        const qs = new URLSearchParams(window.location.search || '')
        const moduleRaw = String(qs.get('module') || '').trim().toLowerCase()
        const routeMap = {
          overview: '/admin/overview',
          project: '/admin/projects',
          projects: '/admin/projects',
          order: '/admin/orders',
          orders: '/admin/orders',
          user: '/admin/users',
          users: '/admin/users',
          submission: '/admin/submissions',
          submissions: '/admin/submissions',
          designer: '/admin/designers',
          designers: '/admin/designers',
          feedback: '/admin/feedback',
          log: '/admin/logs',
          logs: '/admin/logs',
          setting: '/admin/settings',
          settings: '/admin/settings',
          adapter: '/admin/part-adapter',
          'part-adapter': '/admin/part-adapter'
        }
        const target = routeMap[moduleRaw] || '/admin/overview'
        const link = document.getElementById('targetLink')
        if (link) {
          link.href = target
        }
        window.location.replace(target)
      })()
    </script>
  </body>
</html>
