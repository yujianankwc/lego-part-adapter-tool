<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>原创设计师计划后台 · 订单管理</title>
    <link rel="stylesheet" href="/admin-assets/admin.css" />
  </head>
  <body>
    <div class="wrap" id="adminPageRoot" data-admin-module="order" data-single-module="1">
      <h1>原创设计师计划运营后台</h1>
      <div class="card row">
        <input id="baseUrl" value="http://127.0.0.1:8002" style="min-width: 260px" />
        <input id="adminToken" value="kwc-admin-dev" style="min-width: 220px" />
        <select id="adminRole" style="min-width: 140px" onchange="handleAdminRoleChange()">
          <option value="superadmin">超级管理员</option>
          <option value="operator">运营</option>
          <option value="finance">财务</option>
          <option value="reviewer">审核</option>
        </select>
        <input id="adminOperator" value="运营同学" style="min-width: 160px" />
        <button onclick="loadAll()">刷新数据</button>
        <span id="status" class="muted"></span>
      </div>

      <div class="card module-nav">
        <button class="module-btn" data-module-btn="overview" onclick="setAdminModule('overview')">总览</button>
        <button class="module-btn" data-module-btn="project" onclick="setAdminModule('project')">项目管理</button>
        <button class="module-btn" data-module-btn="order" onclick="setAdminModule('order')">订单管理</button>
        <button class="module-btn" data-module-btn="user" onclick="setAdminModule('user')">用户管理</button>
        <button class="module-btn" data-module-btn="submission" onclick="setAdminModule('submission')">投稿审核</button>
        <button class="module-btn" data-module-btn="designer" onclick="setAdminModule('designer')">设计师分成</button>
        <button class="module-btn" data-module-btn="feedback" onclick="setAdminModule('feedback')">反馈中心</button>
        
        <button class="module-btn" data-module-btn="setting" onclick="setAdminModule('setting')">设置中心</button>
      </div>

      <div class="card module-card" data-modules="order">
        <h3>众筹退款执行</h3>
        <div class="row">
          <input id="refundLimitInput" type="number" min="1" max="500" value="50" style="width: 120px" />
          <input id="refundReasonInput" value="众筹截止未达目标，原路退款" style="min-width: 320px" />
          <button onclick="initiateCrowdfundingRefunds()">提交待退款订单到微信</button>
        </div>
        <div class="muted">仅在 PAY_MODE=wechat 且已配置微信商户参数时可用。</div>
      </div>

      <div class="card module-card" data-modules="order">
        <h3>订单中心</h3>
        <div class="row">
          <input id="orderKeyword" placeholder="搜索订单号/作品/版本/openid/昵称" style="min-width: 280px" />
          <select id="orderSaleMode">
            <option value="">全部模式</option>
            <option value="preorder">预售</option>
            <option value="crowdfunding">众筹</option>
          </select>
          <select id="orderPayStatus">
            <option value="">全部支付状态</option>
            <option value="pending">待支付</option>
            <option value="paid">已支付</option>
            <option value="refunded">已退款</option>
          </select>
          <select id="orderRefundStatus">
            <option value="">全部退款状态</option>
            <option value="none">无退款</option>
            <option value="pending_submit">待提交</option>
            <option value="processing">退款中</option>
            <option value="refunded">已退款</option>
            <option value="failed">退款异常</option>
          </select>
          <select id="orderStatusFilter">
            <option value="">全部订单状态</option>
            <option value="pending_deposit">待支付定金</option>
            <option value="deposit_paid">已付定金</option>
            <option value="crowdfunding_pending">待支付众筹</option>
            <option value="crowdfunding_paid">众筹成功</option>
            <option value="crowdfunding_refunding">众筹退款中</option>
            <option value="crowdfunding_refunded">众筹已退款</option>
            <option value="crowdfunding_refund_failed">众筹退款异常</option>
          </select>
          <button onclick="loadOrders()">筛选订单</button>
          <button onclick="resetOrderFilters()">重置筛选</button>
          <a id="orderExportLink" class="btn-link" href="#" target="_blank">导出订单CSV</a>
        </div>
        <div class="muted" id="orderSummary"></div>
        <table>
          <thead>
            <tr>
              <th>订单号</th>
              <th>用户</th>
              <th>模式</th>
              <th>作品</th>
              <th>版本</th>
              <th>数量</th>
              <th>应付/实付/退款</th>
              <th>支付状态</th>
              <th>订单状态</th>
              <th>退款状态</th>
              <th>运营备注</th>
              <th>渠道</th>
              <th>时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="orderRows"></tbody>
        </table>
      </div>

      <div class="card module-card" data-modules="order">
        <h3>预约名单</h3>
        <table>
          <thead>
            <tr>
              <th>openId</th>
              <th>昵称</th>
              <th>作品</th>
              <th>预约时间</th>
            </tr>
          </thead>
          <tbody id="reservationRows"></tbody>
        </table>
      </div>
    </div>

    <script src="/admin-assets/admin.js"></script>
  </body>
</html>
