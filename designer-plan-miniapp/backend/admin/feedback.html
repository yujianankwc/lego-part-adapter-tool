<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>原创设计师计划后台 · 反馈中心</title>
    <link rel="stylesheet" href="/admin-assets/admin.css" />
  </head>
  <body>
    <div class="wrap" id="adminPageRoot" data-admin-module="feedback" data-single-module="1">
      <h1>原创设计师计划运营后台</h1>
      <div class="card row">
        <input id="baseUrl" value="http://127.0.0.1:8002" style="min-width: 260px" />
        <input id="adminToken" value="kwc-admin-dev" style="min-width: 220px" />
        <select id="adminRole" style="min-width: 140px" onchange="handleAdminRoleChange()">
          <option value="superadmin">超级管理员</option>
          <option value="operator">运营</option>
          <option value="finance">财务</option>
          <option value="reviewer">审核</option>
        </select>
        <input id="adminOperator" value="运营同学" style="min-width: 160px" />
        <button onclick="loadAll()">刷新数据</button>
        <span id="status" class="muted"></span>
      </div>

      <div class="card module-nav">
        <button class="module-btn" data-module-btn="overview" onclick="setAdminModule('overview')">总览</button>
        <button class="module-btn" data-module-btn="project" onclick="setAdminModule('project')">项目管理</button>
        <button class="module-btn" data-module-btn="order" onclick="setAdminModule('order')">订单管理</button>
        <button class="module-btn" data-module-btn="user" onclick="setAdminModule('user')">用户管理</button>
        <button class="module-btn" data-module-btn="submission" onclick="setAdminModule('submission')">投稿审核</button>
        <button class="module-btn" data-module-btn="designer" onclick="setAdminModule('designer')">设计师分成</button>
        <button class="module-btn" data-module-btn="feedback" onclick="setAdminModule('feedback')">反馈中心</button>
        
        <button class="module-btn" data-module-btn="setting" onclick="setAdminModule('setting')">设置中心</button>
      </div>

      <div class="card module-card" data-modules="feedback">
        <h3>反馈中心</h3>
        <div class="row">
          <select id="feedbackStatusFilter" onchange="loadFeedbacks()">
            <option value="">全部状态</option>
            <option value="pending">待处理</option>
            <option value="processing">处理中</option>
            <option value="resolved">已解决</option>
            <option value="rejected">已驳回</option>
          </select>
          <select id="feedbackPriorityFilter" onchange="loadFeedbacks()">
            <option value="">全部优先级</option>
            <option value="low">低</option>
            <option value="normal">普通</option>
            <option value="high">高</option>
            <option value="urgent">紧急</option>
          </select>
          <select id="feedbackTemplateSelect" style="min-width: 220px"></select>
          <button onclick="loadFeedbackTemplates()">刷新模板</button>
          <button onclick="exportFeedbackCsv()">导出CSV</button>
          <input id="feedbackKeyword" placeholder="搜索 openid/昵称/内容/联系方式" style="min-width: 300px" />
          <button onclick="loadFeedbacks()">筛选反馈</button>
        </div>
        <div class="muted" id="feedbackSummary"></div>
        <div class="row">
          <input id="feedbackTplCode" placeholder="模板编码（如 shipping_delay）" style="min-width: 200px" />
          <input id="feedbackTplTitle" placeholder="模板标题" style="min-width: 180px" />
          <input id="feedbackTplContent" placeholder="模板内容（建议80字内）" style="min-width: 420px" />
          <select id="feedbackTplActive">
            <option value="1">启用</option>
            <option value="0">停用</option>
          </select>
          <button onclick="saveFeedbackTemplate()">保存模板</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>用户</th>
              <th>类型</th>
              <th>优先级</th>
              <th>内容</th>
              <th>附件</th>
              <th>状态</th>
              <th>官方回复</th>
              <th>时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="feedbackRows"></tbody>
        </table>
      </div>
    </div>

    <div id="imgPreviewMask" class="img-preview-mask" onclick="closeFeedbackImagePreview(event)">
      <div class="img-preview-panel">
        <img id="imgPreviewImage" src="" alt="反馈附件预览" />
        <div class="img-preview-actions">
          <a id="imgPreviewOpenLink" class="btn-link" href="#" target="_blank" rel="noopener noreferrer">新窗口打开</a>
          <button class="btn-small" onclick="closeFeedbackImagePreview(event)">关闭</button>
        </div>
      </div>
    </div>

    <script src="/admin-assets/admin.js"></script>
  </body>
</html>
